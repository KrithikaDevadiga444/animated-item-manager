<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Item Manager</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="page">
    <nav id="navbar" class="navbar">
      <div class="navbar-left">
        <a href="/home.html" class="nav-link">Home</a>
        <a href="/index.html" class="nav-link active">Items</a>
        <a href="/diary.html" class="nav-link">Diary</a>
      </div>
      <div class="navbar-right">
        <span class="user-badge"></span>
        <button class="btn-logout">Log Out</button>
      </div>
    </nav>

    <header class="page-header">
      <h1>📦 Item Manager</h1>
      <p>Your personal inventory — search, filter, and track what you need</p>
    </header>

    <!-- Category dashboard -->
    <section class="panel" id="statsPanel">
      <h2 class="panel-title">Overview by Category</h2>
      <div id="statsGrid" class="stats-grid"></div>
    </section>

    <!-- Add item form -->
    <section class="panel">
      <h2 class="panel-title">Add New Item</h2>
      <form id="addForm" class="form-grid">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" required placeholder="e.g. USB-C cable">
        </div>
        <div class="form-group">
          <label for="category">Category</label>
          <select id="category"></select>
        </div>
        <div class="form-group">
          <label for="quantity">Quantity</label>
          <input id="quantity" type="number" min="1" value="1">
        </div>
        <div class="form-group">
          <label for="status">Status</label>
          <select id="status"></select>
        </div>
        <div class="form-group full-width">
          <label for="notes">Notes (optional)</label>
          <textarea id="notes" placeholder="Any extra details..."></textarea>
        </div>
        <div class="full-width">
          <button type="submit" class="btn btn-primary">Add Item</button>
        </div>
      </form>
    </section>

    <!-- Filters -->
    <section class="panel">
      <h2 class="panel-title">Your Items</h2>
      <div class="toolbar">
        <div class="form-group">
          <label for="search">Search</label>
          <input id="search" placeholder="Filter by name...">
        </div>
        <div class="form-group">
          <label for="filterCategory">Category</label>
          <select id="filterCategory"><option value="all">All</option></select>
        </div>
        <div class="form-group">
          <label for="filterStatus">Status</label>
          <select id="filterStatus"><option value="all">All</option></select>
        </div>
        <div class="form-group">
          <label for="sortBy">Sort</label>
          <select id="sortBy">
            <option value="createdAt">Date added</option>
            <option value="name">Name</option>
            <option value="category">Category</option>
            <option value="status">Status</option>
          </select>
        </div>
      </div>
      <div id="itemsList" class="items-list" style="margin-top: 20px;"></div>
    </section>
  </div>

  <!-- Edit modal -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Edit Item</h2>
      <form id="editForm" class="form-grid">
        <input type="hidden" id="editId">
        <div class="form-group full-width">
          <label for="editName">Name</label>
          <input id="editName" required>
        </div>
        <div class="form-group">
          <label for="editCategory">Category</label>
          <select id="editCategory"></select>
        </div>
        <div class="form-group">
          <label for="editQuantity">Quantity</label>
          <input id="editQuantity" type="number" min="1">
        </div>
        <div class="form-group">
          <label for="editStatus">Status</label>
          <select id="editStatus"></select>
        </div>
        <div class="form-group full-width">
          <label for="editNotes">Notes</label>
          <textarea id="editNotes"></textarea>
        </div>
        <div class="modal-actions full-width">
          <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete confirmation modal -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Delete Item?</h2>
      <p id="deleteMessage">This action cannot be undone.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelDelete">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/items.js"></script>
</body>
</html>
