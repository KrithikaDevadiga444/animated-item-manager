<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Digital Space</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="home-page">

  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="home-container">
    <h1>✨ My Digital Space</h1>
    <p>Manage your inventory and capture your thoughts — all in one place</p>

    <div id="authBar" class="home-auth-bar"></div>

    <div class="card-wrapper">
      <a href="/index.html" id="itemsCard" class="home-card">
        <div class="emoji">📦</div>
        <h2>Item Manager</h2>
        <span>Track & organize personal inventory</span>
      </a>

      <a href="/diary.html" id="diaryCard" class="home-card">
        <div class="emoji">📔</div>
        <h2>Diary</h2>
        <span>Write your daily thoughts</span>
      </a>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const authBar = document.getElementById('authBar');
    const itemsCard = document.getElementById('itemsCard');
    const diaryCard = document.getElementById('diaryCard');

    Auth.getUser().then(user => {
      if (user) {
        authBar.innerHTML = `
          <span class="user-badge">Signed in as <strong>${Auth.escapeHtml(user.username)}</strong></span>
          <button class="btn-logout" id="logoutBtn">Log Out</button>
        `;
        document.getElementById('logoutBtn').addEventListener('click', () => Auth.logout());
      } else {
        itemsCard.classList.add('disabled');
        diaryCard.classList.add('disabled');
        authBar.innerHTML = `
          <a href="/login.html" class="nav-link">Log In</a>
          <a href="/register.html" class="nav-link">Sign Up</a>
        `;
      }
    });
  </script>
</body>
</html>
