<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Diary</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body class="diary-page">
  <div class="page">
    <nav id="navbar" class="navbar">
      <div class="navbar-left">
        <a href="/home.html" class="nav-link">Home</a>
        <a href="/index.html" class="nav-link">Items</a>
        <a href="/diary.html" class="nav-link active">Diary</a>
      </div>
      <div class="navbar-right">
        <span class="user-badge"></span>
        <button class="btn-logout">Log Out</button>
      </div>
    </nav>

    <header class="page-header">
      <h1>📔 My Diary</h1>
      <p>A private space for your thoughts</p>
    </header>

    <section class="panel">
      <textarea id="content" class="diary-textarea" placeholder="What's on your mind today?"></textarea>
      <div class="btn-group">
        <button id="saveBtn" class="btn btn-primary">Save Entry</button>
      </div>
    </section>

    <section class="panel">
      <div class="sort-bar">
        <label for="sortOrder">Sort entries:</label>
        <select id="sortOrder">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </div>
      <div id="entries" class="entries-list"></div>
    </section>
  </div>

  <!-- Edit modal -->
  <div id="editModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Edit Entry</h2>
      <textarea id="editContent" class="diary-textarea" style="min-height: 140px;"></textarea>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelEdit">Cancel</button>
        <button type="button" class="btn btn-primary" id="confirmEdit">Save</button>
      </div>
    </div>
  </div>

  <!-- Delete confirmation -->
  <div id="deleteModal" class="modal-overlay hidden">
    <div class="modal">
      <h2>Delete Entry?</h2>
      <p>This entry will be permanently removed.</p>
      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="cancelDelete">Cancel</button>
        <button type="button" class="btn btn-danger" id="confirmDelete">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/diary.js"></script>
</body>
</html>
