<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Animated Item Manager</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>Welcome back</h1>
      <p class="subtitle">Sign in to manage your items and diary</p>

      <div id="error" class="auth-error"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="email" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary">Log In</button>
      </form>

      <p class="auth-footer">Don't have an account? <a href="/register.html">Sign up</a></p>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    Auth.getUser().then(user => {
      if (user) window.location.href = '/home.html';
    });

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');

      const res = await Auth.apiFetch('/api/auth/login', {
        method: 'POST',
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value
        })
      });

      if (res.ok) {
        window.location.href = '/home.html';
        return;
      }

      const data = await res.json();
      errorEl.textContent = data.error || 'Login failed';
      errorEl.classList.add('visible');
    });
  </script>
</body>
</html>
